# .driftgate/suite.yaml
# Generated by: driftgate init
#
# Providers: anthropic | groq | ollama
# Groq models: llama3-8b-8192 (free, fast), llama3-70b-8192, mixtral-8x7b-32768
# Ollama models: run 'ollama list' to see available

provider: groq
model: llama-3.1-8b-instant
timeout: 30s
concurrency: 5

tests:
  - name: "example test"
    tags: [smoke]
    prompt: "Say hello"
    assertions:
      - type: contains
        value: "hello"
        case_sensitive: false

  - name: "math test"
    tags: [regression]
    prompt: "What is 2 + 2? Reply with just the number."
    assertions:
      - type: contains
        value: "4"
        case_sensitive: false
